version: "3.9"

services:

  # ── ML Service ───────────────────────────────────────────────
  ml:
    build: ../ml
    ports:
      - "8001:8001"
    restart: unless-stopped

  # ── FastAPI App ───────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - kafka
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /project
    volumes:
      - .:/project/app
    restart: unless-stopped

  # ── Claim Worker ──────────────────────────────────────────────
  claim-worker:
    build: .
    env_file: .env
    depends_on:
      - redis
      - kafka
    command: python -m app.workers.claim_worker
    working_dir: /project
    restart: unless-stopped

  # ── Alert Worker ──────────────────────────────────────────────
  alert-worker:
    build: .
    env_file: .env
    depends_on:
      - redis
      - kafka
    command: python -m app.workers.alert_worker
    working_dir: /project
    restart: unless-stopped

  # ── Zone Poller ───────────────────────────────────────────────
  zone-poller:
    build: .
    env_file: .env
    depends_on:
      - kafka
    command: python -m app.workers.zone_poller
    working_dir: /project
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # ── Zookeeper (required by Kafka) ─────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  # ── Kafka ─────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped

volumes:
  redis_data:
